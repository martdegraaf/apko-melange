contents:
  repositories:
    - https://packages.wolfi.dev/os
    - '@local /work/packages'
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - /work/melange.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - glibc
    - libstdc++
    - libssl3
    - weather-api@local

accounts:
  groups:
    - groupname: app
      gid: 65532
  users:
    - username: app
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /app/WeatherApi

environment:
  ASPNETCORE_URLS: http://+:8080
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "true"

archs:
  - x86_64
